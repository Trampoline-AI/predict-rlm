<svg width="680" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif;">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Axis -->
<line x1="50" y1="60" x2="630" y2="60" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="50" y="46" text-anchor="start" font-size="14" font-weight="500" fill="#333">Sweet</text>
<text x="50" y="84" text-anchor="start" font-size="12" fill="#888">Human knowledge</text>
<text x="630" y="46" text-anchor="end" font-size="14" font-weight="500" fill="#333">Bitter</text>
<text x="630" y="84" text-anchor="end" font-size="12" fill="#888">Scale + compute</text>

<!-- Ticks -->
<line x1="100" y1="55" x2="100" y2="65" stroke="#888" stroke-width="1"/>
<line x1="250" y1="55" x2="250" y2="65" stroke="#888" stroke-width="1"/>
<line x1="400" y1="55" x2="400" y2="65" stroke="#888" stroke-width="1"/>
<line x1="560" y1="55" x2="560" y2="65" stroke="#888" stroke-width="1"/>

<!-- 1: Hand-written -->
<rect x="60" y="100" width="80" height="50" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="100" y="120" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">Hand-</text>
<text x="100" y="136" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">written</text>

<!-- 2: DSPy -->
<rect x="216" y="100" width="68" height="50" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="250" y="128" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489">DSPy</text>

<!-- 3: Meta-Harness -->
<rect x="360" y="100" width="80" height="50" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text x="400" y="120" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806">Meta-</text>
<text x="400" y="136" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806">Harness</text>

<!-- 4: RLM -->
<rect x="526" y="100" width="68" height="50" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="560" y="128" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">RLM</text>

<!-- What gets optimized -->
<text x="100" y="174" text-anchor="middle" font-size="12" fill="#555">Human writes</text>
<text x="100" y="190" text-anchor="middle" font-size="12" fill="#555"><tspan font-family="Georgia, serif" font-style="italic">I</tspan> and <tspan font-family="Georgia, serif" font-style="italic">C</tspan></text>

<text x="250" y="174" text-anchor="middle" font-size="12" fill="#555">Optimizer</text>
<text x="250" y="190" text-anchor="middle" font-size="12" fill="#555">tunes <tspan font-family="Georgia, serif" font-style="italic">I</tspan></text>

<text x="400" y="174" text-anchor="middle" font-size="12" fill="#555">Agent searches</text>
<text x="400" y="190" text-anchor="middle" font-size="12" fill="#555">over <tspan font-family="Georgia, serif" font-style="italic">C</tspan> as code</text>

<text x="560" y="174" text-anchor="middle" font-size="12" fill="#555">LM generates <tspan font-family="Georgia, serif" font-style="italic">C</tspan></text>
<text x="560" y="190" text-anchor="middle" font-size="12" fill="#555">at inference</text>

<!-- Technique -->
<text x="100" y="218" text-anchor="middle" font-size="12" fill="#999">Prompt eng.</text>
<text x="250" y="218" text-anchor="middle" font-size="12" fill="#999">MIPRO</text>
<text x="400" y="218" text-anchor="middle" font-size="12" fill="#999">Code search</text>
<text x="560" y="218" text-anchor="middle" font-size="12" fill="#999">REPL + recurse</text>

<!-- Notation -->
<line x1="40" y1="248" x2="640" y2="248" stroke="#888" stroke-width="0.5" opacity="0.15"/>
<text x="340" y="272" text-anchor="middle" font-size="14" font-weight="500" fill="#333">Notation</text>
<text x="340" y="298" text-anchor="middle" font-size="12" fill="#555"><tspan font-family="Georgia, serif" font-style="italic">I</tspan>    Instructions — task description, prompt, system message</text>
<text x="340" y="320" text-anchor="middle" font-size="12" fill="#555"><tspan font-family="Georgia, serif" font-style="italic">C</tspan>    Control flow — orchestration logic (store, retrieve, present)</text>
</svg>
