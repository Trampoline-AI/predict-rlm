<svg width="680" viewBox="0 0 680 590" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif;">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Headers -->
<text x="152" y="18" text-anchor="middle" font-size="14" font-weight="500" fill="#333">Classic harness</text>
<text x="512" y="18" text-anchor="middle" font-size="14" font-weight="500" fill="#333">RLM</text>

<!-- LEFT: Harness -->
<rect x="30" y="32" width="260" height="380" rx="14" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="160" y="56" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Harness</text>

<rect x="58" y="72" width="204" height="34" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text x="160" y="89" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Instructions (<tspan font-family="Georgia, serif" font-style="italic">I</tspan>)</text>
<line x1="160" y1="106" x2="160" y2="120" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="46" y="122" width="228" height="260" rx="10" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
<text x="160" y="146" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">LM (<tspan font-family="Georgia, serif" font-style="italic">M</tspan>)</text>

<rect x="64" y="164" width="180" height="32" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="154" y="180" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489">Control flow (<tspan font-family="Georgia, serif" font-style="italic">C</tspan>)</text>

<rect x="64" y="206" width="180" height="48" rx="6" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text x="154" y="222" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C">Tools / CLIs (<tspan font-family="Georgia, serif" font-style="italic">T</tspan>)</text>
<text x="154" y="240" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C" opacity="0.6">grep, curl, python</text>

<rect x="64" y="264" width="180" height="32" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="154" y="280" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">Runtime / Bash</text>

<path d="M244 280 L258 280 L258 180 L244 180" fill="none" stroke="#854F0B" stroke-width="0.5" marker-end="url(#arrow)" opacity="0.6"/>
<text x="264" y="234" text-anchor="start" font-size="12" fill="#854F0B">Loop</text>

<!-- RIGHT: RLM -->
<rect x="390" y="32" width="260" height="380" rx="14" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="520" y="56" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Sandbox</text>

<rect x="418" y="72" width="204" height="34" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
<text x="520" y="89" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Instructions (<tspan font-family="Georgia, serif" font-style="italic">I</tspan>)</text>
<line x1="520" y1="106" x2="520" y2="120" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="406" y="122" width="228" height="260" rx="10" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
<text x="520" y="146" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">LM (<tspan font-family="Georgia, serif" font-style="italic">M</tspan>)</text>

<rect x="424" y="164" width="180" height="30" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="514" y="179" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489">Reasoning / planning</text>

<rect x="424" y="202" width="180" height="48" rx="6" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text x="514" y="218" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C">Tools / Libs (<tspan font-family="Georgia, serif" font-style="italic">T</tspan>)</text>
<text x="514" y="236" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C" opacity="0.6">requests, subprocess, os</text>

<rect x="424" y="258" width="180" height="30" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="514" y="273" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041">Runtime / Python REPL</text>

<rect x="424" y="296" width="180" height="30" rx="6" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
<text x="514" y="311" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#712B13">Recursive self-calls</text>

<path d="M604 311 L618 311 L618 179 L604 179" fill="none" stroke="#993C1D" stroke-width="0.5" marker-end="url(#arrow)" opacity="0.6"/>
<text x="624" y="238" text-anchor="start" font-size="12" fill="#993C1D">Reflect</text>
<text x="624" y="254" text-anchor="start" font-size="12" fill="#993C1D">+ loop</text>

<!-- Formulas -->
<text x="152" y="438" text-anchor="middle" font-size="12" fill="#555"><tspan font-family="Georgia, serif" font-style="italic">H</tspan> = (<tspan font-family="Georgia, serif" font-style="italic"> I, C, M, T </tspan>)  4 knobs</text>
<text x="512" y="438" text-anchor="middle" font-size="12" fill="#555"><tspan font-family="Georgia, serif" font-style="italic">H</tspan> = (<tspan font-family="Georgia, serif" font-style="italic"> I, M, T </tspan>)  3 knobs, <tspan font-family="Georgia, serif" font-style="italic">C</tspan> ∈ θ</text>

<!-- Legend -->
<line x1="40" y1="462" x2="640" y2="462" stroke="#888" stroke-width="0.5" opacity="0.2"/>
<text x="340" y="484" text-anchor="middle" font-size="14" font-weight="500" fill="#333">Notation</text>

<text x="240" y="508" text-anchor="start" font-size="12" fill="#555"><tspan font-family="Georgia, serif" font-style="italic">I</tspan>    Instructions (prompt, system message)</text>
<text x="240" y="526" text-anchor="start" font-size="12" fill="#555"><tspan font-family="Georgia, serif" font-style="italic">C</tspan>    Control flow (store, retrieve, present)</text>
<text x="240" y="544" text-anchor="start" font-size="12" fill="#555"><tspan font-family="Georgia, serif" font-style="italic">M</tspan>    Model (Claude, GPT-4, Llama)</text>
<text x="240" y="562" text-anchor="start" font-size="12" fill="#555"><tspan font-family="Georgia, serif" font-style="italic">T</tspan>    Tools (CLIs or libraries)</text>
</svg>
